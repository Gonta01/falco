[fprime]
project_root: .
framework_path: ./fprime

default_cmake_options:  FPRIME_ENABLE_FRAMEWORK_UTS=OFF
                        FPRIME_ENABLE_AUTOCODER_UTS=OFF
                        APP_MODE=APP_STANDARD
                        ENABLE_ERROR_LOGGING_IN_FILE=ON
library_locations:./fprime-linux:./fprime-falco
default_toolchain: samv71q21b
config_directory: ./config
